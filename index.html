import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getDatabase, ref, set, get, onValue, update, remove }
  from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js';

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── 전역 Firebase 함수 노출 ──
window.FB = { db, ref, set, get, onValue, update, remove };
window.ONLINE_MODE = false;
window.ROOM_ID = null;
window.MY_PLAYER_ID = null;

// ── 방 코드 생성 ──
window.generateRoomCode = () => {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
};

// ── 방 만들기 ──
window.createRoom = async (roomCode, hostName, playerCount, aiCount, aiDifficulty) => {
  const roomRef = ref(db, `rooms/${roomCode}`);
  const snap = await get(roomRef);
  if (snap.exists()) return { ok: false, msg: '이미 존재하는 방 코드입니다.' };

  await set(roomRef, {
    status: 'waiting',
    host: hostName,
    playerCount,
    aiCount,
    aiDifficulty,
    createdAt: Date.now(),
    players: { 0: { name: hostName, ready: false, id: 0 } },
    gameState: null,
  });
  window.ONLINE_MODE = true;
  window.ROOM_ID = roomCode;
  window.MY_PLAYER_ID = 0;
  return { ok: true };
};

// ── 방 참가 ──
window.joinRoom = async (roomCode, playerName) => {
  const roomRef = ref(db, `rooms/${roomCode}`);
  const snap = await get(roomRef);
  if (!snap.exists()) return { ok: false, msg: '존재하지 않는 방입니다.' };

  const room = snap.val();
  if (room.status !== 'waiting') return { ok: false, msg: '이미 시작된 게임입니다.' };

  const players = room.players || {};
  const ids = Object.keys(players).map(Number);
  const maxHuman = room.playerCount;
  if (ids.length >= maxHuman) return { ok: false, msg: '방이 가득 찼습니다.' };

  const newId = Math.max(...ids) + 1;
  await update(ref(db, `rooms/${roomCode}/players`), {
    [newId]: { name: playerName, ready: false, id: newId }
  });

  window.ONLINE_MODE = true;
  window.ROOM_ID = roomCode;
  window.MY_PLAYER_ID = newId;
  return { ok: true, roomData: room };
};

// ── 게임 상태 저장 ──
window.saveGameState = async (gameState) => {
  if (!window.ONLINE_MODE || !window.ROOM_ID) return;
  try {
    // 함수 제거 후 저장 (Firebase는 함수 저장 불가)
    const safe = JSON.parse(JSON.stringify(gameState));
    await set(ref(db, `rooms/${window.ROOM_ID}/gameState`), safe);
  } catch(e) { console.warn('saveGameState error:', e); }
};

// ── 게임 상태 구독 ──
window.subscribeGameState = (callback) => {
  if (!window.ONLINE_MODE || !window.ROOM_ID) return () => {};
  const unsub = onValue(ref(db, `rooms/${window.ROOM_ID}/gameState`), snap => {
    if (snap.exists()) callback(snap.val());
  });
  return unsub;
};

// ── 방 구독 ──
window.subscribeRoom = (roomCode, callback) => {
  const unsub = onValue(ref(db, `rooms/${roomCode}`), snap => {
    if (snap.exists()) callback(snap.val());
  });
  return unsub;
};

// ── Firebase 준비 완료 → 게임 마운트 ──
window.FB_READY = true;
window.dispatchEvent(new Event('fb-ready'));
</script>

</script>

// ============================================================
// HEX GRID HELPERS
// ============================================================
function hexToPixel(q, r, size) {
  const x = size * (3 / 2 * q);
  const y = size * (Math.sqrt(3) / 2 * q + Math.sqrt(3) * r);
  return { x, y };
}

function hexDistance(a, b) {
  return Math.max(Math.abs(a.q - b.q), Math.abs(a.r - b.r), Math.abs(a.q + a.r - b.q - b.r));
}

function getNeighbors(q, r) {
  return [
    { q: q+1, r }, { q: q-1, r },
    { q, r: r+1 }, { q, r: r-1 },
    { q: q+1, r: r-1 }, { q: q-1, r: r+1 },
  ];
}

function checkChain(territories, minLength, board) {
  if (territories.length < minLength) return false;
  for (const start of territories) {
    const visited = new Set([start]);
    const queue = [start];
    while (queue.length > 0) {
      const cur = queue.shift();
      const tile = board[cur];
      if (!tile) continue;
      const neighbors = getNeighbors(tile.q, tile.r);
      for (const n of neighbors) {
        const nKey = `${n.q},${n.r}`;
        if (territories.includes(nKey) && !visited.has(nKey)) {
          visited.add(nKey);
          queue.push(nKey);
        }
      }
      if (visited.size >= minLength) return true;
    }
  }
  return false;
}

  const shuffledRandom2 = [...randomTypes].sort(() => Math.random() - 0.5);
  const randomPositions = [
    // 중간 링
    { q: 2, r: 1 }, { q: -2, r: -1 }, { q: 1, r: 2 },
    { q: -1, r: -2 }, { q: 3, r: -1 }, { q: -3, r: 1 },

  // 추가 고정 자원 타일 (외곽)
  [
    { q: 4, r: -1, type: "gold" }, { q: -4, r: 1, type: "iron" },
    { q: 2, r: 2, type: "wood" }, { q: -2, r: -2, type: "mana" },
    { q: 3, r: -4, type: "food" }, { q: -3, r: 4, type: "gold" },
    { q: 4, r: -5, type: "special" }, { q: -4, r: 5, type: "special" },
    { q: 5, r: -3, type: "center" }, { q: -5, r: 3, type: "center" },
  ].forEach(pos => positions.push(pos));

  // Start positions based on player count
  const startPositions = [
    { q: 4, r: -4, dir: "northeast" },
    { q: -4, r: 4, dir: "southwest" },
    { q: 4, r: 0, dir: "east" },
    { q: -4, r: 0, dir: "west" },
    { q: 0, r: 4, dir: "southeast" },
    { q: 0, r: -4, dir: "northwest" },
  ];
  for (let i = 0; i < playerCount; i++) {
    positions.push({ ...startPositions[i], type: "start", startIndex: i });
  }

  positions.forEach(pos => {
    const key = `${pos.q},${pos.r}`;
    const typeData = TILE_TYPES[pos.type];
    tiles[key] = {
      q: pos.q, r: pos.r, key,
      type: pos.type,
      isRandom: pos.isRandom || false,
      owner: null,
      hasMonster: typeData?.hasMonster || false,
      monsterLevel: typeData?.hasMonster ? Math.floor(Math.random() * 3) : null,
      obstacle: pos.type === "obstacle",
      startIndex: pos.startIndex ?? null,
      dir: pos.dir ?? null,
    };
  });

  return tiles;
}

function initPlayers(playerCount, aiDifficulty, humanCount = 1) {
  // 시작 위치를 매 게임 랜덤으로 섞기
  const allPositions = ["northeast","southwest","east","west","southeast","northwest"];
  const shuffledPositions = [...allPositions].sort(() => Math.random() - 0.5);

  // 세력 풀 전체를 랜덤으로 섞어서 배정 (위치 연계 제거 → 진짜 랜덤)
  const allFactions = Object.keys(FACTIONS);
  const shuffledFactions = [...allFactions].sort(() => Math.random() - 0.5);

  return Array.from({ length: playerCount }, (_, i) => {
    const pos = shuffledPositions[i];
    const factionId = shuffledFactions[i];
    const faction = FACTIONS[factionId];
    const isHuman = i < humanCount;
    const humanLabel = humanCount > 1 ? `플레이어 ${i + 1}` : "플레이어";
    const aiLabel = `AI ${i - humanCount + 1}`;

    return {
      id: i,
      name: isHuman ? humanLabel : aiLabel,
      isAI: !isHuman,
      aiDifficulty: isHuman ? null : aiDifficulty,
      faction: factionId,
      resources: { ...faction.startResources },
      cards: [],
      reservedCards: [],
      territories: [],
      score: 0,
      totalLooted: 0,
      consecutiveWins: 0,
      invasionDefenseUsed: 0,
      goalMainDone: false,
      goalFinalDone: false,
      goalSubCount: 0,
      startPos: pos,
      color: faction.color,
    };
  });
}

// ============================================================
// SCORE CALCULATION
// ============================================================
function calcScore(player, board) {
  let score = 0;
  // Territory points
  player.territories.forEach(key => {
    const tile = board[key];
    if (tile) score += TILE_TYPES[tile.type]?.points || 0;
  });
  // Card points
  player.cards.forEach(card => score += card.points || 0);
  // Influence bonus
  if (player.resources.influence >= 5) score += 1;
  // Goal points
  score += player.goalSubCount;
  if (player.goalMainDone) score += 2;
  if (player.goalFinalDone) score += 3;
  return score;
}

// ============================================================
// AI LOGIC
// ============================================================
function aiDecide(player, gameState, difficulty) {
  const { board, cardDisplay, pool, round } = gameState;
  const actions = [];
  const totalRes = Object.values(player.resources).reduce((s, v) => s + v, 0);

  // 난이도별 가중치
  const invadePrio  = { easy: 0,  normal: 3, hard: 5 }[difficulty];
  const capturePrio = { easy: 3,  normal: 5, hard: 4 }[difficulty];
  const cardPrio    = { easy: 2,  normal: 3, hard: 5 }[difficulty];

  // 자원 수집 - 항상 후보
  actions.push({ type: "collect", priority: totalRes < 4 ? 5 : 1 });

  // 카드 구매
  const allCards = [...cardDisplay[1], ...cardDisplay[2], ...cardDisplay[3]];
  const affordable = allCards.filter(card => canAfford(player.resources, card.cost));
  if (affordable.length > 0) {
    const best = affordable.sort((a, b) => {
      const scoreA = (a.points || 0) * 3 + (a.combatBonus || 0) + a.tier;
      const scoreB = (b.points || 0) * 3 + (b.combatBonus || 0) + b.tier;
      return scoreB - scoreA;
    })[0];
    actions.push({ type: "buyCard", card: best, priority: cardPrio });
  }

  // 영토 선점 - 점수 높은 타일 우선
  const captureable = Object.values(board).filter(t =>
    t.canCapture && !t.owner && !t.obstacle && !t.hasMonster &&
    canAffordCapture(player, t)
  ).sort((a, b) => (TILE_TYPES[b.type]?.points || 0) - (TILE_TYPES[a.type]?.points || 0));
  if (captureable.length > 0) {
    actions.push({ type: "capture", tile: captureable[0], priority: capturePrio });
  }

  // 침략 - normal/hard는 적극적으로
  if (invadePrio > 0) {
    // 고가치 타일 or 점수 낮은 상대 우선 타겟
    const targets = Object.values(board).filter(t =>
      t.owner !== null && t.owner !== player.id && t.type !== "start"
    ).sort((a, b) => {
      // 점수 높은 타일 우선
      const ptsDiff = (TILE_TYPES[b.type]?.points || 0) - (TILE_TYPES[a.type]?.points || 0);
      if (ptsDiff !== 0) return ptsDiff;
      // 상대 플레이어 점수 낮은 쪽 우선 (쉬운 상대)
      const ownerA = gameState.players[a.owner];
      const ownerB = gameState.players[b.owner];
      return (ownerA?.score || 0) - (ownerB?.score || 0);
    });
    if (targets.length > 0) {
      // 침략 가능 자원 확인 (철 1개)
      const hasIron = player.faction === "knight" || (player.resources.iron || 0) >= 1;
      if (hasIron && totalRes >= 3) {
        // hard는 리더 공격, normal은 약자 공격
        const target = difficulty === "hard" ? targets[0] : targets[targets.length - 1] || targets[0];
        actions.push({ type: "invade", tile: target, priority: invadePrio });
      }
    }
  }

  actions.sort((a, b) => b.priority - a.priority);
  // 같은 priority면 랜덤 섞기
  const top = actions[0].priority;
  const topActions = actions.filter(a => a.priority === top);
  return topActions[Math.floor(Math.random() * topActions.length)];
}

function canAfford(resources, cost) {
  return Object.entries(cost).every(([r, v]) => (resources[r] || 0) >= v);
}

function canAffordCapture(player, tile) {
  const type = TILE_TYPES[tile.type];
  if (!type) return false;
  const cost = Object.entries(type.produces)[0];
  if (!cost) return true;
  return (player.resources[cost[0]] || 0) >= 2;
}

// ============================================================

function ArkaniaGame() {
  const [screen, setScreen] = useState("lobby"); // lobby | setup | game | battle | result
  const [humanCount, setHumanCount] = useState(1);
  const [aiCount, setAiCount] = useState(3);
  const [aiDifficulty, setAiDifficulty] = useState("normal");
  const playerCount = humanCount + aiCount;
  const [gameState, setGameState] = useState(null);
  const [selectedTile, setSelectedTile] = useState(null);
  const [actionMode, setActionMode] = useState(null); // collect | capture | invade | monster | buy
  const [battleState, setBattleState] = useState(null);
  const [log, setLog] = useState([]);
  const [showCards, setShowCards] = useState(false);
  const [showGoals, setShowGoals] = useState(false);
  const [toast, setToast] = useState(null);
  const logRef = useRef(null);
  const { w: winW } = useWindowSize();

  // 반응형 분기
  const isPC = winW >= 1024;
  const isTablet = winW >= 640 && winW < 1024;
  const sideW = isPC ? 220 : isTablet ? 180 : 160;

  const showToast = useCallback((msg, type = "info") => {
    setToast({ msg, type, id: Date.now() });
    setTimeout(() => setToast(null), 2800);
  }, []);

  const addLog = useCallback((msg, type = "info") => {
    setLog(prev => [...prev.slice(-30), { msg, type, id: Date.now() + Math.random() }]);
    setTimeout(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, 50);
  }, []);

  function startGame() {
    const board = generateMap(playerCount);
    const decks = createDecks();
    const display = createDisplay(decks);
    const players = initPlayers(playerCount, aiDifficulty, humanCount);

    // Assign start territories - dir(방향)으로 매칭
    const updatedBoard = { ...board };
    players.forEach(p => {
      const startKey = Object.keys(updatedBoard).find(k =>
        updatedBoard[k].type === "start" && updatedBoard[k].dir === p.startPos
      );
      if (startKey) {
        updatedBoard[startKey].owner = p.id;
        p.territories.push(startKey);
      }
    });

    const state = {
      board: updatedBoard, decks, cardDisplay: display,
      players, currentPlayer: 0, round: 1,
      phase: "event", actionDone: false,
      pool: { ...RESOURCE_POOL },
      eventCard: null, winner: null,
    };
    state.players.forEach(p => { p.score = calcScore(p, state.board); });
    setGameState(state);
    setScreen("game");
    addLog("게임 시작! 아르카니아의 패권을 차지하라!", "system");
    setTimeout(() => processPhase(state), 300);
  }

  function processPhase(state) {
    const gs = { ...state };
    if (gs.phase === "event") {
      const events = [
        "풍요의 계절: 모든 자원 타일 생산 +1",
        "마법 폭풍: 마나석 전투력 ×2",
        "대역병: 전원 식량 -1",
        "교역로 개방: 자원 교환 1:1",
        "왕의 포고령: 이번 라운드 침략 불가",
        "어둠의 각성: 몬스터 전투력 +2",
      ];
      gs.eventCard = events[Math.floor(Math.random() * events.length)];
      gs.phase = "produce";
      addLog(`[이벤트] ${gs.eventCard}`, "event");
      setGameState({ ...gs });
      setTimeout(() => processPhase(gs), 800);
    } else if (gs.phase === "produce") {
      gs.players = gs.players.map(p => {
        const newRes = { ...p.resources };
        p.territories.forEach(key => {
          const tile = gs.board[key];
          if (!tile) return;
          const produces = TILE_TYPES[tile.type]?.produces || {};
          Object.entries(produces).forEach(([r, v]) => {
            newRes[r] = Math.min(10, (newRes[r] || 0) + v);
          });
        });
        // Card production
        p.cards.forEach(card => {
          if (card.effect?.produce) {
            Object.entries(card.effect.produce).forEach(([r, v]) => {
              newRes[r] = Math.min(10, (newRes[r] || 0) + v);
            });
          }
        });
        return { ...p, resources: newRes };
      });
      gs.phase = "action";
      addLog(`라운드 ${gs.round} — 생산 완료`, "system");
      setGameState({ ...gs });
    }
  }

  function endTurn(gs) {
    const nextGs = { ...gs };
    const curPlayer = nextGs.players[nextGs.currentPlayer];

    // Check goals
    checkGoals(nextGs, curPlayer);

    // Check score
    nextGs.players[nextGs.currentPlayer].score = calcScore(curPlayer, nextGs.board);

    // Check win - 15점 달성 플래그 설정
    const scorer = nextGs.players[nextGs.currentPlayer];
    if (scorer.score >= 15 && !nextGs.winTriggered) {
      nextGs.winTriggered = true;
      nextGs.winTriggerRound = nextGs.round;
      addLog(`🏆 ${scorer.name}이(가) ${scorer.score}점으로 15점 달성! 이번 라운드 종료 후 게임 끝!`, "goal");
      showToast(`🏆 ${scorer.name} 15점 달성! 라운드 완료 후 종료!`, "battle");
    }
    // 라운드 마지막 플레이어가 끝났고 winTriggered면 종료
    const isLastPlayer = nextGs.currentPlayer >= nextGs.players.length - 1;
    if (nextGs.winTriggered && isLastPlayer) {
      nextGs.players.forEach(p => { p.score = calcScore(p, nextGs.board); });
      const winner = nextGs.players.reduce((a, b) => a.score > b.score ? a : b);
      nextGs.winner = winner;
      setGameState(nextGs);
      setScreen("result");
      return;
    }

    // Next player
    if (nextGs.currentPlayer < nextGs.players.length - 1) {
      nextGs.currentPlayer++;
      nextGs.actionDone = false;
      setGameState(nextGs);
      addLog(`${nextGs.players[nextGs.currentPlayer].name}의 턴`, "turn");
      if (nextGs.players[nextGs.currentPlayer].isAI) {
        setTimeout(() => doAITurn(nextGs), 1000);
      }
    } else {
      // Next round
      nextGs.currentPlayer = 0;
      nextGs.round++;
      nextGs.phase = "event";
      nextGs.actionDone = false;
      addLog(`=== 라운드 ${nextGs.round} 시작 ===`, "round");
      setGameState(nextGs);
      setTimeout(() => processPhase(nextGs), 500);
    }
  }

  function doAITurn(gs) {
    const player = gs.players[gs.currentPlayer];
    const action = aiDecide(player, gs, player.aiDifficulty);
    const nextGs = { ...gs };
    const p = { ...nextGs.players[nextGs.currentPlayer] };

    if (action.type === "collect") {
      const resources = Object.keys(RESOURCES);
      const r = resources[Math.floor(Math.random() * resources.length)];
      if (nextGs.pool[r] > 0 && p.resources[r] < 10) {
        const amount = Math.min(2, nextGs.pool[r], 10 - p.resources[r]);
        p.resources = { ...p.resources, [r]: (p.resources[r] || 0) + amount };
        nextGs.pool[r] -= amount;
        addLog(`${p.name}: ${RESOURCES[r].name} ${amount}개 수집`, "action");
      }
    } else if (action.type === "buyCard" && action.card) {
      const card = action.card;
      const tier = card.tier;
      if (canAfford(p.resources, card.cost)) {
        Object.entries(card.cost).forEach(([r, v]) => { p.resources[r] -= v; });
        p.cards = [...p.cards, card];
        nextGs.cardDisplay[tier] = nextGs.cardDisplay[tier].filter(c => c.id !== card.id);
        if (nextGs.decks[tier].length > 0) nextGs.cardDisplay[tier].push(nextGs.decks[tier].shift());
        addLog(`${p.name}: [${card.name}] 구매`, "action");
      }
    } else if (action.type === "capture" && action.tile) {
      const t = action.tile;
      nextGs.board[t.key] = { ...nextGs.board[t.key], owner: p.id };
      p.territories = [...p.territories, t.key];
      addLog(`${p.name}: ${TILE_TYPES[t.type]?.name} 선점`, "action");
    } else if (action.type === "invade" && action.tile) {
      const t = action.tile;
      const defId = t.owner;
      const defender = { ...nextGs.players[defId] };
      // 철 소비
      if (p.faction !== "knight") p.resources = { ...p.resources, iron: Math.max(0, (p.resources.iron || 0) - 1) };
      // 전투력 계산
      const aPower = p.cards.reduce((s, c) => s + (c.combatBonus || 0), 0) +
        Math.floor(Math.random() * 4); // AI 베팅 시뮬
      const dPower = defender.cards.reduce((s, c) => s + (c.combatBonus || 0), 0) +
        Math.floor(Math.random() * 3);
      if (aPower >= dPower) {
        nextGs.board[t.key] = { ...nextGs.board[t.key], owner: p.id };
        defender.territories = defender.territories.filter(k => k !== t.key);
        p.territories = [...p.territories, t.key];
        const loot = Math.floor(Math.random() * 2) + 1;
        p.resources.gold = Math.min(10, (p.resources.gold || 0) + loot);
        p.totalLooted = (p.totalLooted || 0) + loot;
        addLog(`⚔️ ${p.name}: ${TILE_TYPES[t.type]?.name} 침략 성공!`, "battle");
        nextGs.players[defId] = { ...defender, score: calcScore(defender, nextGs.board) };
      } else {
        addLog(`🛡️ ${p.name}: 침략 실패 (방어자 승리)`, "battle");
      }
    }

    nextGs.players[nextGs.currentPlayer] = p;
    nextGs.actionDone = true;
    setGameState(nextGs);
    setTimeout(() => endTurn(nextGs), 600);
  }

  function checkGoals(gs, player) {
    const faction = FACTIONS[player.faction];
    const p = gs.players[gs.currentPlayer];

    // Main goal
    if (!p.goalMainDone && faction.goalMain.check(p, gs.board)) {
      p.goalMainDone = true;
      addLog(`🎯 ${p.name}: 주 목표 달성! +2점`, "goal");
    }
    // Final goal
    if (!p.goalFinalDone && faction.goalFinal.check && faction.goalFinal.check(p, gs.board)) {
      p.goalFinalDone = true;
      addLog(`🏆 ${p.name}: 최종 목표 달성! +3점`, "goal");
    }
  }

  // Player actions
  function handleCollect(resource) {
    if (!gameState || gameState.actionDone) return;
    const gs = { ...gameState };
    const p = { ...gs.players[gs.currentPlayer] };
    if (p.resources[resource] >= 10 || gs.pool[resource] <= 0) return;
    const amount = Math.min(2, gs.pool[resource], 10 - p.resources[resource]);
    p.resources = { ...p.resources, [resource]: (p.resources[resource] || 0) + amount };
    gs.pool[resource] -= amount;
    gs.players[gs.currentPlayer] = p;
    gs.actionDone = true;
    addLog(`${p.name}: ${RESOURCES[resource].icon}${RESOURCES[resource].name} ${amount}개 수집`, "action");
    showToast(`${RESOURCES[resource].icon} ${RESOURCES[resource].name} ${amount}개 수집!`, "collect");
    setGameState(gs);
    setActionMode(null);
  }

  function handleCapture(tileKey) {
    if (!gameState || gameState.actionDone) return;
    const gs = { ...gameState };
    const tile = gs.board[tileKey];
    const p = { ...gs.players[gs.currentPlayer] };
    if (!tile || tile.owner !== null || tile.obstacle || !TILE_TYPES[tile.type]?.canCapture) return;
    if (tile.hasMonster) { handleMonsterBattle(tileKey); return; }

    // Cost: 2 of primary resource
    const produces = TILE_TYPES[tile.type]?.produces || {};
    const mainRes = Object.keys(produces)[0];
    let discount = p.faction === "druid" ? 1 : 0;
    p.cards.forEach(c => { if (c.effect?.captureDiscount) discount += c.effect.captureDiscount; });
    const cost = Math.max(1, 2 - discount);

    if (mainRes && (p.resources[mainRes] || 0) < cost) {
      addLog(`자원 부족! ${RESOURCES[mainRes]?.name} ${cost}개 필요`, "warn");
      return;
    }
    if (mainRes) p.resources = { ...p.resources, [mainRes]: p.resources[mainRes] - cost };

    gs.board[tileKey] = { ...tile, owner: p.id };
    p.territories = [...p.territories, tileKey];
    gs.players[gs.currentPlayer] = p;
    gs.actionDone = true;
    addLog(`${p.name}: ${TILE_TYPES[tile.type]?.name} 선점 성공!`, "action");
    showToast(`🏴 ${TILE_TYPES[tile.type]?.name} 선점 성공!`, "capture");
    setGameState(gs);
    setSelectedTile(null);
    setActionMode(null);
  }

  function handleMonsterBattle(tileKey) {
    const gs = gameState;
    const tile = gs.board[tileKey];
    const p = gs.players[gs.currentPlayer];
    const monster = MONSTERS[tile.monsterLevel ?? 0];
    setBattleState({
      type: "monster", tileKey, monster,
      playerBet: {}, playerCards: p.cards.filter(c => c.combatBonus > 0),
      phase: "bet",
    });
    setScreen("battle");
  }

  function handleInvade(tileKey) {
    if (!gameState || gameState.actionDone) return;
    const gs = gameState;
    const tile = gs.board[tileKey];
    const p = gs.players[gs.currentPlayer];
    if (!tile || tile.owner === null || tile.owner === p.id) return;

    // Cost: 1 iron (free for knight)
    if (p.faction !== "knight" && (p.resources.iron || 0) < 1) {
      addLog("침략에 철 1개 필요", "warn"); return;
    }

    const defender = gs.players[tile.owner];
    setBattleState({
      type: "invasion", tileKey,
      attacker: p.id, defender: defender.id,
      attackerBet: {}, defenderBet: {},
      phase: "attackerBet",
    });
    setScreen("battle");
  }

  function handleBuyCard(card) {
    if (!gameState || gameState.actionDone) return;
    const gs = { ...gameState };
    const p = { ...gs.players[gs.currentPlayer] };
    if (!canAfford(p.resources, card.cost)) {
      addLog("자원 부족!", "warn"); return;
    }
    Object.entries(card.cost).forEach(([r, v]) => { p.resources[r] -= v; });

    // Mage passive: refund 1 mana for tier 2+
    if (p.faction === "mage" && card.tier >= 2 && p.resources.mana < 10) {
      p.resources.mana = Math.min(10, p.resources.mana + 1);
    }

    p.cards = [...p.cards, card];
    const tier = card.tier;
    gs.cardDisplay[tier] = gs.cardDisplay[tier].filter(c => c.id !== card.id);
    if (gs.decks[tier].length > 0) gs.cardDisplay[tier].push(gs.decks[tier].shift());
    gs.players[gs.currentPlayer] = p;
    gs.actionDone = true;
    addLog(`${p.name}: [${card.name}] 구매!`, "action");
    showToast(`📜 [${card.name}] 구매 완료!`, "card");
    setGameState(gs);
    setShowCards(false);
  }

  function resolveBattle() {
    if (!battleState || !gameState) return;
    const gs = { ...gameState };

    if (battleState.type === "monster") {
      const p = { ...gs.players[gs.currentPlayer] };
      const monster = battleState.monster;
      const betPower = Object.entries(battleState.playerBet).reduce((sum, [r, v]) => sum + (BATTLE_VALUES[r] || 1) * v, 0);
      const cardPower = p.cards.reduce((sum, c) => sum + (c.combatBonus || 0), 0);
      const totalPower = Math.min(betPower + cardPower, 20);

      // Deduct bet
      Object.entries(battleState.playerBet).forEach(([r, v]) => { p.resources[r] = (p.resources[r] || 0) - v; });

      if (totalPower >= monster.power) {
        // Win
        const tile = gs.board[battleState.tileKey];
        gs.board[battleState.tileKey] = { ...tile, owner: p.id, hasMonster: false };
        p.territories = [...p.territories, battleState.tileKey];
        const bonus = p.faction === "druid" ? 1 : 0;
        const totalRes = monster.reward.resources + bonus;
        p.resources.gold = Math.min(10, p.resources.gold + totalRes);
        if (monster.reward.bonus) p.score = (p.score || 0) + monster.reward.bonus;
        // Goal: druid
        if (p.faction === "druid") {
          p.goalSubCount = Math.min(FACTIONS.druid.goalSub.max, (p.goalSubCount || 0) + 1);
        }
        addLog(`${p.name}: ${monster.icon}${monster.name} 토벌 성공! 보상 수령`, "battle");
        showToast(`${monster.icon} ${monster.name} 토벌 성공! 보상 획득`, "battle");
      } else {
        addLog(`${p.name}: ${monster.icon}${monster.name} 토벌 실패... 베팅 자원 손실`, "battle");
        showToast(`${monster.icon} 토벌 실패! 베팅 자원 손실`, "warn");
      }
      gs.players[gs.currentPlayer] = p;
      gs.actionDone = true;
      setGameState(gs);
      setScreen("game");
      setBattleState(null);

    } else if (battleState.type === "invasion") {
      const attacker = { ...gs.players[battleState.attacker] };
      const defender = { ...gs.players[battleState.defender] };

      // Deduct iron for attacker (if not knight)
      if (attacker.faction !== "knight") attacker.resources.iron = Math.max(0, attacker.resources.iron - 1);

      const aBetPower = Object.entries(battleState.attackerBet).reduce((sum, [r, v]) => sum + (BATTLE_VALUES[r] || 1) * v, 0);
      const dBetPower = Object.entries(battleState.defenderBet).reduce((sum, [r, v]) => sum + (BATTLE_VALUES[r] || 1) * v, 0);
      const aCardPower = attacker.cards.reduce((sum, c) => sum + (c.combatBonus || 0), 0);
      const dCardPower = defender.cards.reduce((sum, c) => sum + (c.combatBonus || 0), 0);

      // Faction bonuses
      const dBonus = defender.faction === "knight" ? 2 : 0;
      const aTotalPower = Math.min(aBetPower + aCardPower, 20);
      const dTotalPower = Math.min(dBetPower + dCardPower + dBonus, 20);

      // Deduct bets
      Object.entries(battleState.attackerBet).forEach(([r, v]) => { attacker.resources[r] = Math.max(0, (attacker.resources[r] || 0) - v); });
      Object.entries(battleState.defenderBet).forEach(([r, v]) => { defender.resources[r] = Math.max(0, (defender.resources[r] || 0) - v); });

      const lootRate = attacker.faction === "dark" ? 0.7 : 0.5;
      const defLossRate = defender.faction === "merchant" ? 0.3 : 0.5;

      if (aTotalPower > dTotalPower) {
        // Attacker wins
        const tile = gs.board[battleState.tileKey];
        gs.board[battleState.tileKey] = { ...tile, owner: attacker.id };
        defender.territories = defender.territories.filter(t => t !== battleState.tileKey);
        attacker.territories = [...attacker.territories, battleState.tileKey];

        // Loot
        const loot = Math.floor(Object.values(battleState.defenderBet).reduce((s, v) => s + v, 0) * lootRate);
        attacker.resources.gold = Math.min(10, attacker.resources.gold + loot);
        attacker.totalLooted = (attacker.totalLooted || 0) + loot;
        attacker.consecutiveWins = (attacker.consecutiveWins || 0) + 1;

        // Knight sub-goal
        if (attacker.faction === "knight") {
          attacker.goalSubCount = Math.min(FACTIONS.knight.goalSub.max, (attacker.goalSubCount || 0) + 1);
        }

        addLog(`⚔️ ${attacker.name} 침략 성공! ${TILE_TYPES[tile.type]?.name} 획득`, "battle");
        showToast(`⚔️ 침략 성공! ${TILE_TYPES[tile.type]?.name} 획득`, "battle");
      } else {
        // Defender wins
        defender.consecutiveWins = (defender.consecutiveWins || 0) + 1;
        attacker.consecutiveWins = 0;
        addLog(`🛡️ ${defender.name} 방어 성공!`, "battle");
        showToast(`🛡️ ${defender.name} 방어 성공!`, "warn");
      }

      gs.players[attacker.id] = { ...attacker, score: calcScore(attacker, gs.board) };
      gs.players[defender.id] = { ...defender, score: calcScore(defender, gs.board) };
      gs.currentPlayer = attacker.id;
      gs.actionDone = true;
      setGameState(gs);
      setScreen("game");
      setBattleState(null);
    }
  }

  // ============================================================
  // RENDER
  // ============================================================
  if (screen === "lobby") return <LobbyScreen onStart={() => setScreen("setup")} onGuide={() => setScreen("guide")} />;
  if (screen === "guide") return <GuideScreen onBack={() => setScreen("lobby")} />;
  if (screen === "setup") return (
    <SetupScreen
      humanCount={humanCount} setHumanCount={setHumanCount}
      aiCount={aiCount} setAiCount={setAiCount}
      playerCount={playerCount}
      aiDifficulty={aiDifficulty} setAiDifficulty={setAiDifficulty}
      onStart={startGame} onBack={() => setScreen("lobby")}
    />
  );
  if (screen === "battle") return (
    <BattleScreen
      battleState={battleState} setBattleState={setBattleState}
      gameState={gameState} onResolve={resolveBattle}
      onCancel={() => { setBattleState(null); setScreen("game"); setActionMode(null); }}
    />
  );
  if (screen === "result") return <ResultScreen gameState={gameState} onRestart={() => setScreen("lobby")} />;

  if (!gameState) return null;
  const currentPlayer = gameState.players[gameState.currentPlayer];
  const isMyTurn = !currentPlayer.isAI;

  return (
    <div style={styles.gameRoot}>

      {/* ── TOP BAR ── */}
      <div style={styles.topBar}>
        <div style={styles.topBarLeft}>
          <span style={styles.gameTitleSmall}>⚔️ ARKANIA</span>
          <span style={styles.roundBadge}>R{gameState.round}</span>
          {gameState.eventCard && (
            <span style={styles.eventBadge}>📜 {gameState.eventCard.split(':')[0]}</span>
          )}
        </div>
        {/* 플레이어 점수 칩 */}
        <div style={styles.topBarRight}>
          {gameState.players.map(p => (
            <div key={p.id} style={{
              ...styles.playerChip,
              borderColor: p.color,
              opacity: p.id === gameState.currentPlayer ? 1 : 0.45,
              transform: p.id === gameState.currentPlayer ? "scale(1.08)" : "scale(1)",
              transition: "all 0.2s",
            }}>
              <span style={{ fontSize: 14 }}>{FACTIONS[p.faction].icon}</span>
              <span style={{ color: p.color, fontSize: 11, fontWeight: 700 }}>{p.name}</span>
              <span style={styles.scoreChip}>{p.score}점</span>
            </div>
          ))}
        </div>
        {/* 로그 토글 */}
        <button style={styles.logToggleBtn} onClick={() => setShowGoals(!showGoals)}>
          {showGoals ? "🗺️ 지도" : "📋 기록"}
        </button>
      </div>

      {/* ── MAIN: 맵이 전체를 차지 ── */}
      <div style={styles.mainArea}>

        {/* 맵 */}
        <div style={styles.mapArea}>
          <HexMap
            board={gameState.board} players={gameState.players}
            selectedTile={selectedTile} setSelectedTile={setSelectedTile}
            actionMode={actionMode} currentPlayer={currentPlayer}
            onCapture={handleCapture} onInvade={handleInvade}
            playerResources={currentPlayer.resources}
            playerFaction={currentPlayer.faction}
          />
          {/* 맵 위 오버레이: 기록창 */}
          {showGoals && (
            <div style={styles.logOverlay}>
              <div style={styles.logOverlayTitle}>📋 진행 기록</div>
              <div ref={logRef} style={styles.logOverlayList}>
                {log.map(l => (
                  <div key={l.id} style={{ ...styles.logItem, color: LOG_COLORS[l.type] || "#cbd5e1" }}>
                    {l.msg}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* ── 우측 좁은 정보 바 ── */}
        <div style={{ ...styles.sideBar, width: sideW }}>
          {/* 현재 플레이어 자원 */}
          <div style={{ ...styles.sideCard, borderColor: currentPlayer.color }}>
            <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6 }}>
              <span style={{ fontSize:16 }}>{FACTIONS[currentPlayer.faction].icon}</span>
              <span style={{ color: currentPlayer.color, fontWeight:700, fontSize:12 }}>{currentPlayer.name}</span>
              <span style={{ marginLeft:"auto", color:"#fbbf24", fontWeight:700 }}>🏆{currentPlayer.score}</span>
            </div>
            <div style={styles.sideResGrid}>
              {Object.entries(currentPlayer.resources).map(([r, v]) => (
                <div key={r} style={styles.sideResItem}>
                  <span style={{ fontSize:13 }}>{RESOURCES[r].icon}</span>
                  <span style={{ color: RESOURCES[r].color, fontWeight:700, fontSize:12 }}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{ fontSize:10, color:"#64748b", marginTop:4, display:"flex", gap:8 }}>
              <span>🗺️{currentPlayer.territories.length}칸</span>
              <span>📜{currentPlayer.cards.length}장</span>
            </div>
          </div>

          {/* 목표 미니 */}
          <div style={styles.sideCard}>
            <div style={{ fontSize:10, color:"#94a3b8", fontWeight:700, marginBottom:6 }}>🎯 내 목표</div>
            {(() => {
              const f = FACTIONS[currentPlayer.faction];
              return (
                <>
                  {/* 주 목표 */}
                  <div style={{ fontSize:10, marginBottom:4 }}>
                    <div style={{ display:"flex", gap:4, alignItems:"center" }}>
                      <span>{currentPlayer.goalMainDone ? "✅" : "⬜"}</span>
                      <span style={{ color: currentPlayer.goalMainDone ? "#4ade80" : "#e2e8f0", flex:1 }}>주목표 (+2점)</span>
                    </div>
                    <div style={{ color:"#64748b", fontSize:9, marginTop:1, lineHeight:1.3 }}>{f.goalMain.desc}</div>
                  </div>
                  {/* 부 목표 진행도 */}
                  <div style={{ fontSize:10, marginBottom:4 }}>
                    <div style={{ display:"flex", justifyContent:"space-between" }}>
                      <span style={{ color:"#fbbf24" }}>📊 부목표 +{currentPlayer.goalSubCount}점</span>
                      <span style={{ color:"#64748b" }}>{currentPlayer.goalSubCount}/{f.goalSub.max}</span>
                    </div>
                    <div style={{ height:3, background:"#334155", borderRadius:3, marginTop:2 }}>
                      <div style={{ height:"100%", width:`${Math.min(100,(currentPlayer.goalSubCount/f.goalSub.max)*100)}%`, background:"#f59e0b", borderRadius:3 }} />
                    </div>
                  </div>
                  {/* 최종 목표 */}
                  <div style={{ fontSize:10 }}>
                    <div style={{ display:"flex", gap:4, alignItems:"center" }}>
                      <span>{currentPlayer.goalFinalDone ? "🏆" : "⬜"}</span>
                      <span style={{ color: currentPlayer.goalFinalDone ? "#fbbf24" : "#e2e8f0", flex:1 }}>최종목표 (+3점)</span>
                    </div>
                    <div style={{ color:"#64748b", fontSize:9, marginTop:1, lineHeight:1.3 }}>{f.goalFinal.desc}</div>
                  </div>
                </>
              );
            })()}
          </div>

          {/* 전체 점수 */}
          <div style={styles.sideCard}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
              <span style={{ fontSize:10, color:"#94a3b8", fontWeight:700 }}>📊 점수 현황</span>
              <span style={{ fontSize:9, color:"#64748b" }}>목표 15점</span>
            </div>
            {[...gameState.players].sort((a,b) => b.score - a.score).map((p,i) => (
              <div key={p.id} style={{ marginBottom:6 }}>
                <div style={{ display:"flex", gap:4, alignItems:"center", marginBottom:2 }}>
                  <span style={{ fontSize:10 }}>{["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣"][i]}</span>
                  <span style={{ fontSize:10, color: p.color, flex:1 }}>{FACTIONS[p.faction].icon}{p.name}</span>
                  <span style={{ fontSize:11, color: p.score >= 15 ? "#4ade80" : "#fbbf24", fontWeight:700 }}>{p.score}점</span>
                </div>
                {/* 점수 바 */}
                <div style={{ height:4, background:"#334155", borderRadius:4, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${Math.min(100, (p.score/15)*100)}%`, background: p.score >= 12 ? "#4ade80" : p.score >= 8 ? "#f59e0b" : p.color, borderRadius:4, transition:"width 0.4s" }} />
                </div>
              </div>
            ))}
            {gameState.winTriggered && (
              <div style={{ marginTop:6, padding:"4px 6px", background:"#7f1d1d", borderRadius:6, fontSize:10, color:"#fca5a5", textAlign:"center" }}>
                ⚠️ 이번 라운드 종료 후 게임 끝!
              </div>
            )}
          </div>

          {/* PC에서만: 진행 기록 사이드바 고정 표시 */}
          {isPC && (
            <div style={{ ...styles.sideCard, flex:1, display:"flex", flexDirection:"column", minHeight:0 }}>
              <div style={{ fontSize:10, color:"#94a3b8", fontWeight:700, marginBottom:6 }}>📋 진행 기록</div>
              <div ref={logRef} style={{ overflowY:"auto", flex:1, display:"flex", flexDirection:"column", gap:3 }}>
                {log.map(l => (
                  <div key={l.id} style={{ ...styles.logItem, color: LOG_COLORS[l.type] || "#cbd5e1" }}>
                    {l.msg}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── 하단 액션 바 ── */}
      <div style={{ ...styles.bottomBar, padding: isPC ? "8px 20px" : "6px 10px" }}>
        {isMyTurn && !gameState.actionDone && (
          <>
            {/* 행동 버튼 4개 */}
            <div style={styles.bottomActions}>
              {[
                { mode:"collect", icon:"💎", label:"자원 수집", bg:"#1d4ed8" },
                { mode:"capture", icon:"🏴", label:"영토 선점", bg:"#065f46" },
                { mode:"invade",  icon:"⚔️", label:"침략",     bg:"#991b1b" },
              ].map(({ mode, icon, label, bg }) => (
                <button key={mode}
                  style={{
                    ...styles.bottomActionBtn,
                    background: actionMode === mode ? bg : "#1e293b",
                    borderColor: actionMode === mode ? "#fff" : "#334155",
                    padding: isPC ? "8px 24px" : "6px 14px",
                    minWidth: isPC ? 100 : 72,
                  }}
                  onClick={() => setActionMode(actionMode === mode ? null : mode)}>
                  <span style={{ fontSize: isPC ? 22 : 18 }}>{icon}</span>
                  <span style={{ fontSize: isPC ? 13 : 11 }}>{label}</span>
                </button>
              ))}
              <button style={{
                ...styles.bottomActionBtn,
                background:"#4c1d95", borderColor:"#7c3aed",
                padding: isPC ? "8px 24px" : "6px 14px",
                minWidth: isPC ? 100 : 72,
              }}
                onClick={() => setShowCards(true)}>
                <span style={{ fontSize: isPC ? 22 : 18 }}>📜</span>
                <span style={{ fontSize: isPC ? 13 : 11 }}>카드 구매</span>
              </button>
            </div>

            {/* 모드 안내 한 줄 */}
              {actionMode === "capture" && (
                <span style={styles.modeHint}>🏴 초록 타일 클릭 → 선점 / 회색=불가</span>
              )}
              {actionMode === "invade" && (
                <span style={styles.modeHint}>⚔️ 빨간 테두리 타일 클릭 → 침략</span>
              )}
            {actionMode === "collect" && (
              <div style={styles.collectBar}>
                {Object.entries(RESOURCES).map(([r, data]) => {
                  const disabled = gameState.pool[r] <= 0 || currentPlayer.resources[r] >= 10;
                  return (
                    <button key={r}
                      style={{ ...styles.collectBarBtn, borderColor: data.color, opacity: disabled ? 0.35 : 1 }}
                      onClick={() => !disabled && handleCollect(r)}
                      disabled={disabled}>
                      <span style={{ fontSize:20 }}>{data.icon}</span>
                      <span style={{ fontSize:11, color: data.color, fontWeight:700 }}>{data.name}</span>
                      <span style={{ fontSize:10, color:"#64748b" }}>풀:{gameState.pool[r]}</span>
                    </button>
                  );
                })}
              </div>
            )}
          </>
        )}

        {isMyTurn && gameState.actionDone && (
          <div style={styles.bottomActions}>
            <button style={styles.endTurnBtnBottom} onClick={() => endTurn(gameState)}>
              ✅ 턴 종료 →
            </button>
          </div>
        )}

        {!isMyTurn && (
          <div style={styles.bottomActions}>
            <div style={styles.aiThinkingBar}>
              🤖 {currentPlayer.name} 행동 중...
            </div>
          </div>
        )}
      </div>

      {/* Card Modal */}
      {toast && (
        <div style={{ ...styles.toast, background: TOAST_COLORS[toast.type] || "#1e293b" }}>
          {toast.msg}
        </div>
      )}
      {showCards && (
        <CardModal cardDisplay={gameState.cardDisplay} player={currentPlayer}
          onBuy={handleBuyCard} onClose={() => setShowCards(false)} />
      )}
    </div>
  );
}

};

function useWindowSize() {
  const [size, setSize] = useState({ w: window.innerWidth, h: window.innerHeight });
  useEffect(() => {
    const fn = () => setSize({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return size;
}

const LOG_COLORS = {
  system: "#60a5fa", event: "#f59e0b", action: "#4ade80",
  battle: "#f87171", goal: "#a78bfa", turn: "#e2e8f0",
  warn: "#fb923c", round: "#67e8f9",
};

// ============================================================
// HEX MAP COMPONENT
// ============================================================
function HexMap({ board, players, selectedTile, setSelectedTile, actionMode, currentPlayer, onCapture, onInvade, playerResources, playerFaction }) {
  const ref = useRef(null);
  const [dims, setDims] = useState({ w: 800, h: 600 });

  useEffect(() => {
    function update() {
      if (ref.current) {
        setDims({ w: ref.current.clientWidth, h: ref.current.clientHeight });
      }
    }
    update();
    window.addEventListener("resize", update);
    return () => window.removeEventListener("resize", update);
  }, []);

  const tiles = Object.values(board);
  const minQ = Math.min(...tiles.map(t => t.q));
  const minR = Math.min(...tiles.map(t => t.r));
  const maxQ = Math.max(...tiles.map(t => t.q));
  const maxR = Math.max(...tiles.map(t => t.r));

  // 화면 크기에 맞게 타일 크기 자동 계산
  const spanQ = maxQ - minQ + 4;
  const spanR = maxR - minR + 4;
  const sizeByW = dims.w / (spanQ * 1.6);
  const sizeByH = dims.h / (spanR * 1.8);
  const size = Math.max(22, Math.min(48, Math.floor(Math.min(sizeByW, sizeByH))));

  const offsetX = size * 2;
  const offsetY = size * 2;
  const svgW = (maxQ - minQ + 3) * size * 2;
  const svgH = (maxR - minR + 3) * size * 1.8

  function hexCorners(cx, cy, sz) {
    return Array.from({ length: 6 }, (_, i) => {
      const angle = (Math.PI / 180) * (60 * i - 30);
      return `${cx + sz * Math.cos(angle)},${cy + sz * Math.sin(angle)}`;
    }).join(" ");
  }

  // 선점 가능 여부 계산
  function checkCaptureable(tile) {
    if (tile.owner !== null || tile.obstacle || !TILE_TYPES[tile.type]?.canCapture) return false;
    if (tile.hasMonster) return true; // 몬스터는 전투로 가능
    const produces = TILE_TYPES[tile.type]?.produces || {};
    const mainRes = Object.keys(produces)[0];
    const discount = playerFaction === "druid" ? 1 : 0;
    const cost = Math.max(1, 2 - discount);
    if (!mainRes) return true;
    return (playerResources?.[mainRes] || 0) >= cost;
  }

  function handleTileClick(tile) {
    if (actionMode === "capture") { onCapture(tile.key); return; }
    if (actionMode === "invade") { onInvade(tile.key); return; }
    setSelectedTile(selectedTile === tile.key ? null : tile.key);
  }

  return (
    <div ref={ref} style={{ width:"100%", height:"100%", overflow:"hidden" }}>
    <svg width="100%" height="100%" viewBox={`0 0 ${svgW} ${svgH}`} style={styles.hexSvg}>
      <defs>
        <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#1a2744" />
          <stop offset="100%" stopColor="#0f172a" />
        </radialGradient>
        {/* 선점 가능 펄스 필터 */}
        <filter id="glow">
          <feGaussianBlur stdDeviation="2.5" result="blur" />
          <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
      </defs>
      <rect width={svgW} height={svgH} fill="url(#bgGrad)" />
      {tiles.map(tile => {
        const { x, y } = hexToPixel(tile.q - minQ, tile.r - minR, size);
        const cx = x + offsetX;
        const cy = y + offsetY;
        const typeData = TILE_TYPES[tile.type] || TILE_TYPES.wasteland;
        const owner = tile.owner !== null ? players[tile.owner] : null;
        const isSelected = selectedTile === tile.key;

        // 모드별 상태 계산
        const captureable = actionMode === "capture" && checkCaptureable(tile);
        const captureBlocked = actionMode === "capture" && !tile.owner && !tile.obstacle && TILE_TYPES[tile.type]?.canCapture && !captureable;
        const captureUnavailable = actionMode === "capture" && tile.owner !== null && tile.type !== "start";
        const isInvadeTarget = actionMode === "invade" && tile.owner !== null && tile.owner !== currentPlayer.id;
        const isOwnTile = actionMode === "invade" && tile.owner === currentPlayer.id;

        // 테두리 색상 결정
        let strokeColor = owner ? owner.color : typeData.color;
        let strokeW = 1;
        let fillColor = owner ? owner.color + "55" : typeData.color + "33";
        let opacity = tile.obstacle ? 0.35 : 1;
        let useGlow = false;
        let dashArray = "none";

        if (isSelected) {
          strokeColor = "#fff"; strokeW = 3;
        } else if (captureable) {
          strokeColor = "#4ade80"; strokeW = 2.5; fillColor = "#4ade8022"; useGlow = true;
        } else if (captureBlocked) {
          // 자원 부족 - 점선 빨강
          strokeColor = "#f87171"; strokeW = 1.5; dashArray = "4 3"; fillColor = typeData.color + "18";
        } else if (captureUnavailable) {
          // 이미 점령됨 - 회색
          strokeColor = "#334155"; strokeW = 1; fillColor = owner ? owner.color + "30" : "#33415522";
        } else if (isInvadeTarget) {
          strokeColor = "#ef4444"; strokeW = 2.5; fillColor = "#ef444422"; useGlow = true;
        } else if (isOwnTile) {
          strokeColor = "#334155"; strokeW = 1; opacity = 0.7;
        }

        return (
          <g key={tile.key}
            onClick={() => handleTileClick(tile)}
            style={{ cursor: (captureable || isInvadeTarget) ? "pointer" : captureBlocked ? "not-allowed" : "pointer" }}>
            <polygon
              points={hexCorners(cx, cy, size - 2)}
              fill={fillColor}
              stroke={strokeColor}
              strokeWidth={strokeW}
              strokeDasharray={dashArray}
              opacity={opacity}
              filter={useGlow ? "url(#glow)" : "none"}
            />

            {/* 선점 가능 표시 - 체크 아이콘 */}
            {captureable && (
              <text x={cx} y={cy - 14} textAnchor="middle" fontSize={13} fill="#4ade80" opacity={0.9}>✓</text>
            )}
            {/* 자원 부족 표시 */}
            {captureBlocked && (
              <text x={cx} y={cy - 14} textAnchor="middle" fontSize={11} fill="#f87171" opacity={0.8}>✗</text>
            )}
            {/* 침략 대상 표시 */}
            {isInvadeTarget && (
              <text x={cx} y={cy - 14} textAnchor="middle" fontSize={13} fill="#ef4444" opacity={0.9}>⚔</text>
            )}

            {/* 타일 아이콘 */}
            <text x={cx} y={cy + size * 0.08} textAnchor="middle" fontSize={size * 0.42} fill="white">
              {tile.hasMonster
                ? MONSTERS[tile.monsterLevel ?? 0]?.icon
                : tile.obstacle
                  ? "🪨"
                  : tile.type === "center"
                    ? "⭐"
                    : tile.type === "special"
                      ? "✨"
                      : ""}
            </text>

            {/* 타일 이름 */}
            <text x={cx} y={cy + size * 0.38} textAnchor="middle" fontSize={Math.max(7, size * 0.2)} fill="#cbd5e1" fontFamily="serif" opacity={0.85}>
              {typeData.name?.slice(0, size > 35 ? 5 : 3)}
            </text>

            {/* 생산 자원 표시 */}
            {!actionMode && size > 28 && (() => {
              const prods = Object.entries(TILE_TYPES[tile.type]?.produces || {});
              return prods.map(([r, v], i) => (
                <text key={r} x={cx - (prods.length - 1) * (size*0.17) + i * (size*0.34)} y={cy + size * 0.6}
                  textAnchor="middle" fontSize={Math.max(7, size * 0.21)} fill={RESOURCES[r]?.color || "#fff"}>
                  {RESOURCES[r]?.icon}{v}
                </text>
              ));
            })()}

            {/* 소유자 아이콘 */}
            {owner && (
              <text x={cx} y={cy + size * 0.75} textAnchor="middle" fontSize={Math.max(9, size * 0.28)}>
                {FACTIONS[owner.faction]?.icon}
              </text>
            )}
          </g>
        );
      })}
    </svg>
    </div>
  );
}

// BATTLE SCREEN
// ============================================================
function BattleScreen({ battleState, setBattleState, gameState, onResolve, onCancel }) {
  const [bet, setBet] = useState({});
  if (!battleState || !gameState) return null;

  const attacker = battleState.type === "monster" ? gameState.players[gameState.currentPlayer] : gameState.players[battleState.attacker];
  const isMonster = battleState.type === "monster";

  function updateBet(res, delta) {
    const cur = bet[res] || 0;
    const maxBet = Math.floor((attacker.resources[res] || 0) * 0.4);
    const newVal = Math.max(0, Math.min(maxBet, cur + delta));
    setBet({ ...bet, [res]: newVal });
  }

  function confirmBet() {
    if (isMonster) {
      onResolve({ ...battleState, playerBet: bet });
    } else {
      if (battleState.phase === "attackerBet") {
        setBattleState({ ...battleState, attackerBet: bet, phase: "defenderBet" });
        setBet({});
      } else {
        onResolve({ ...battleState, defenderBet: bet });
      }
    }
  }

  const totalPower = Object.entries(bet).reduce((s, [r, v]) => s + (BATTLE_VALUES[r] || 1) * v, 0)
    + attacker.cards.reduce((s, c) => s + (c.combatBonus || 0), 0);

  return (
    <div style={styles.battleRoot}>
      <div style={styles.battlePanel}>
        <div style={styles.battleTitle}>
          {isMonster ? `⚔️ ${battleState.monster.icon} ${battleState.monster.name} 토벌` : "⚔️ 침략 대치!"}
        </div>
        {isMonster && (
          <div style={styles.monsterInfo}>
            <span style={{ fontSize: 40 }}>{battleState.monster.icon}</span>
            <span style={styles.monsterPower}>전투력 {battleState.monster.power}</span>
          </div>
        )}
        <div style={styles.betSection}>
          <div style={styles.betTitle}>
            {isMonster ? "베팅 자원 선택" : battleState.phase === "attackerBet" ? "공격자 베팅" : "방어자 베팅"}
            <span style={{ fontSize: 11, color: "#94a3b8" }}> (보유량의 40% 상한)</span>
          </div>
          <div style={styles.betGrid}>
            {Object.entries(RESOURCES).map(([r, data]) => {
              const max = Math.floor((attacker.resources[r] || 0) * 0.4);
              return (
                <div key={r} style={styles.betRow}>
                  <span style={{ color: data.color }}>{data.icon} {data.name}</span>
                  <span style={{ color: "#64748b", fontSize: 11 }}>보유:{attacker.resources[r] || 0} 상한:{max}</span>
                  <div style={styles.betControls}>
                    <button style={styles.betBtn} onClick={() => updateBet(r, -1)}>−</button>
                    <span style={styles.betValue}>{bet[r] || 0}</span>
                    <button style={styles.betBtn} onClick={() => updateBet(r, 1)}>+</button>
                  </div>
                  <span style={{ color: "#fbbf24", fontSize: 11 }}>전투력 +{((bet[r] || 0) * (BATTLE_VALUES[r] || 1))}</span>
                </div>
              );
            })}
          </div>
          <div style={styles.powerSummary}>
            카드 전투력: {attacker.cards.reduce((s, c) => s + (c.combatBonus || 0), 0)} +
            베팅: {Object.entries(bet).reduce((s, [r, v]) => s + (BATTLE_VALUES[r] || 1) * v, 0)} =
            <span style={{ color: "#4ade80", fontWeight: 700 }}> {totalPower}</span>
            {isMonster && <span style={{ color: totalPower >= battleState.monster.power ? "#4ade80" : "#f87171" }}>
              {totalPower >= battleState.monster.power ? " ✅ 승리 가능" : ` ❌ ${battleState.monster.power - totalPower} 부족`}
            </span>}
          </div>
        </div>
        <div style={styles.battleButtons}>
          <button style={styles.confirmBtn} onClick={confirmBet}>확인 →</button>
          <button style={styles.cancelBtn} onClick={onCancel}>
            취소 (행동 소모 없음)
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
function LobbyScreen({ onStart, onGuide }) {
  const [tab, setTab] = React.useState("home"); // home | create | join
  const [myName, setMyName] = React.useState("");
  const [roomCode, setRoomCode] = React.useState("");
  const [joinCode, setJoinCode] = React.useState("");
  const [status, setStatus] = React.useState("");
  const [statusColor, setStatusColor] = React.useState("#94a3b8");
  const [roomPlayers, setRoomPlayers] = React.useState([]);
  const [inRoom, setInRoom] = React.useState(false);
  const [humanCount, setHumanCount] = React.useState(2);
  const [aiCount, setAiCount] = React.useState(2);
  const [aiDiff, setAiDiff] = React.useState("normal");

  const setMsg = (msg, color="#94a3b8") => { setStatus(msg); setStatusColor(color); };

  // 방 만들기
  async function handleCreate() {
    if (!myName.trim()) { setMsg("닉네임을 입력해 주세요.", "#f87171"); return; }
    if (humanCount + aiCount < 2) { setMsg("최소 2명 필요합니다.", "#f87171"); return; }
    setMsg("방 생성 중...", "#94a3b8");
    const code = window.generateRoomCode();
    setRoomCode(code);
    const res = await window.createRoom(code, myName.trim(), humanCount, aiCount, aiDiff);
    if (!res.ok) { setMsg(res.msg, "#f87171"); return; }
    setMsg("방 생성 완료!", "#4ade80");
    setInRoom(true);
    // 방 참가자 구독
    window.subscribeRoom(code, (room) => {
      setRoomPlayers(Object.values(room.players || {}));
      if (room.status === "started" && room.gameState) {
        // 호스트가 게임 시작하면 모두 게임 화면으로
        window.__startOnlineGame && window.__startOnlineGame(room);
      }
    });
  }

  // 방 참가
  async function handleJoin() {
    if (!myName.trim()) { setMsg("닉네임을 입력해 주세요.", "#f87171"); return; }
    if (!joinCode.trim()) { setMsg("방 코드를 입력해 주세요.", "#f87171"); return; }
    setMsg("참가 중...", "#94a3b8");
    const res = await window.joinRoom(joinCode.trim().toUpperCase(), myName.trim());
    if (!res.ok) { setMsg(res.msg, "#f87171"); return; }
    setRoomCode(joinCode.trim().toUpperCase());
    setMsg("참가 완료! 호스트가 게임을 시작하길 기다리는 중...", "#4ade80");
    setInRoom(true);
    window.subscribeRoom(joinCode.trim().toUpperCase(), (room) => {
      setRoomPlayers(Object.values(room.players || {}));
      if (room.status === "started" && room.gameState) {
        window.__startOnlineGame && window.__startOnlineGame(room);
      }
    });
  }

  // 게임 시작 (호스트만)
  async function handleStartOnline() {
    setMsg("게임 시작 중...", "#f59e0b");
    await window.FB.update(window.FB.ref(window.FB.db, `rooms/${roomCode}`), { status: "started" });
    onStart();
  }

  const isHost = window.MY_PLAYER_ID === 0;

  // 대기실 화면
  if (inRoom) return (
    <div style={styles.lobbyRoot}>
      <div style={{...styles.setupPanel, textAlign:"center"}}>
        <div style={{fontSize:28, color:"#f59e0b", fontWeight:700, marginBottom:8}}>🎮 대기실</div>
        <div style={{background:"#0f172a", borderRadius:12, padding:"16px 24px", marginBottom:20}}>
          <div style={{fontSize:13, color:"#94a3b8", marginBottom:6}}>방 코드</div>
          <div style={{fontSize:36, fontWeight:700, color:"#fbbf24", letterSpacing:8}}>{roomCode}</div>
          <div style={{fontSize:12, color:"#64748b", marginTop:4}}>친구에게 이 코드를 알려주세요</div>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12, color:"#94a3b8", marginBottom:8, fontWeight:700}}>참가자 ({roomPlayers.length}명)</div>
          {roomPlayers.map((p,i) => (
            <div key={i} style={{display:"flex", alignItems:"center", gap:8, padding:"6px 12px", background:"#0f172a", borderRadius:8, marginBottom:4}}>
              <span style={{fontSize:16}}>{i===0?"👑":"👤"}</span>
              <span style={{color:"#e2e8f0"}}>{p.name}</span>
              {i===0 && <span style={{fontSize:10, color:"#f59e0b", marginLeft:"auto"}}>호스트</span>}
            </div>
          ))}
        </div>
        <div style={{fontSize:12, color:statusColor, marginBottom:12}}>{status}</div>

function SetupScreen({ humanCount, setHumanCount, aiCount, setAiCount, playerCount, aiDifficulty, setAiDifficulty, onStart, onBack }) {
  const total = humanCount + aiCount;
  const canStart = total >= 2 && total <= 6;

  return (
    <div style={styles.lobbyRoot}>
      <div style={styles.setupPanel}>
        <h2 style={styles.setupTitle}>⚙️ 게임 설정</h2>

        {/* 플레이어 수 */}
        <div style={styles.setupSection}>
          <div style={styles.setupLabel}>👤 플레이어 수 (사람)</div>
          <div style={styles.setupOptions}>
            {[1, 2, 3, 4].map(n => {
              const valid = n + aiCount >= 2 && n + aiCount <= 6;
              return (
                <button key={n}
                  style={{ ...styles.setupOption, borderColor: humanCount === n ? "#60a5fa" : "#334155", color: humanCount === n ? "#60a5fa" : valid ? "#94a3b8" : "#3f4a5c", cursor: valid ? "pointer" : "not-allowed" }}
                  onClick={() => valid && setHumanCount(n)}>
                  {n}명
                </button>
              );
            })}
          </div>
        </div>

        {/* AI 수 */}
        <div style={styles.setupSection}>
          <div style={styles.setupLabel}>🤖 AI 수</div>
          <div style={styles.setupOptions}>
            {[0, 1, 2, 3, 4, 5].map(n => {
              const valid = humanCount + n >= 2 && humanCount + n <= 6;
              return (
                <button key={n}
                  style={{ ...styles.setupOption, borderColor: aiCount === n ? "#f59e0b" : "#334155", color: aiCount === n ? "#f59e0b" : valid ? "#94a3b8" : "#3f4a5c", cursor: valid ? "pointer" : "not-allowed" }}
                  onClick={() => valid && setAiCount(n)}>
                  {n}명
                </button>
              );
            })}
          </div>
        </div>

        {/* 합계 표시 */}
        <div style={{ ...styles.setupSection, background: canStart ? "#0f2a1a" : "#2a0f0f", border: `1px solid ${canStart ? "#059669" : "#dc2626"}`, borderRadius: 10, padding: "12px 16px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ color: "#94a3b8", fontSize: 13 }}>
              👤 플레이어 {humanCount}명 + 🤖 AI {aiCount}명
            </span>
            <span style={{ color: canStart ? "#4ade80" : "#f87171", fontWeight: 700, fontSize: 15 }}>
              총 {total}명 {canStart ? "✅" : total < 2 ? "❌ 최소 2명" : "❌ 최대 6명"}
            </span>
          </div>
        </div>

        {/* AI 난이도 */}
        {aiCount > 0 && (
          <div style={styles.setupSection}>
            <div style={styles.setupLabel}>🎯 AI 난이도</div>
            <div style={styles.setupOptions}>
              {[["easy","쉬움","🟢"], ["normal","보통","🟡"], ["hard","어려움","🔴"]].map(([v, label, icon]) => (
                <button key={v}
                  style={{ ...styles.setupOption, borderColor: aiDifficulty === v ? "#60a5fa" : "#334155", color: aiDifficulty === v ? "#60a5fa" : "#94a3b8" }}
                  onClick={() => setAiDifficulty(v)}>
                  {icon} {label}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* 세력 배정 안내 */}
        <div style={{ ...styles.setupSection, color: "#64748b", fontSize: 12, lineHeight: 1.6 }}>
          🗺️ 세력은 시작 위치에 따라 자동 랜덤 배정됩니다.<br />
          🏆 목표 점수: 15점 먼저 달성 시 해당 라운드 완료 후 종료
        </div>

        <div style={styles.setupButtons}>
          <button style={styles.backBtn} onClick={onBack}>← 뒤로</button>
          <button
            style={{ ...styles.startBtn, opacity: canStart ? 1 : 0.4, cursor: canStart ? "pointer" : "not-allowed" }}
            onClick={() => canStart && onStart()}>
            게임 시작 →
          </button>
        </div>
      </div>
    </div>
  );
}

                      <div>
                        <div style={{color:"#f59e0b", fontWeight:700, fontSize:13}}>{name} — 필요 전투력: {req}</div>
                        <div style={{color:"#94a3b8", fontSize:12}}>보상: {reward}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{color:"#64748b", fontSize:12, marginTop:8}}>
                  ⚠️ 패배 시 베팅 자원 전량 손실. 몬스터는 다음 턴 재도전 가능.
                </div>
              </GuideSection>
            </div>
          )}

          {/* ── 승리 조건 ── */}
          {tab === "victory" && (
            <div>
              <GuideSection title="🏆 승리 조건" color="#fbbf24">
                <div style={{background:"#1e293b", borderRadius:10, padding:16, textAlign:"center", marginBottom:16}}>
                  <div style={{fontSize:28, fontWeight:700, color:"#fbbf24"}}>15점</div>
                  <div style={{color:"#94a3b8", fontSize:13}}>먼저 달성한 플레이어가 속한 라운드 완료 후<br />최고 점수자가 최종 승리</div>
                </div>
                <div style={{color:"#64748b", fontSize:12, marginBottom:16}}>
                  💡 동점 타이브레이커: 영토 수 → 카드 수 → 자원 총량
                </div>
              </GuideSection>

              <GuideSection title="📊 점수 획득 방법" color="#fbbf24">
                {[
                  ["🗺️","영토 점령 유지","타일 1칸당 1~3점 (타일 종류에 따라 다름)"],
                  ["📜","카드 구매","2등급 +1점 / 3등급 +2~4점"],
                  ["⭐","중앙 거점 점령","3점"],
                  ["✨","특수 타일 점령","2점"],
                  ["🐉","드래곤 토벌","3점"],
                  ["👑","영향력 5개 보유","1점"],
                  ["🎯","세력 주 목표 달성","+2점"],
                  ["📊","세력 부 목표 (반복)","달성마다 +1점 (세력별 상한)"],
                  ["🏆","세력 최종 목표","+3점"],
                ].map(([icon, label, desc]) => (
                  <div key={label} style={{...styles.guideRow, marginBottom:8}}>
                    <span style={{fontSize:18, minWidth:28}}>{icon}</span>
                    <div>
                      <b style={{color:"#e2e8f0", fontSize:13}}>{label}</b>
                      <span style={{color:"#94a3b8", fontSize:12}}> — {desc}</span>

                각 세력마다 <b>주 목표(+2점) / 부 목표(반복 +1점) / 최종 목표(+3점)</b>가 있습니다.<br /><br />
                목표 달성은 자동으로 인식되며 게임 화면 우측 <b style={{color:"#fbbf24"}}>🎯 목표</b> 패널에서 확인 가능합니다.<br /><br />

                  💡 목표 달성에 집중하는 전략이 효과적일 수 있습니다.
                </div>
              </GuideSection>
            </div>
          )}

          {/* ── 세력 소개 ── */}
          {tab === "faction" && (
            <div>
              {Object.values(FACTIONS).map(f => (
                <div key={f.id} style={{...styles.guideRow, alignItems:"flex-start", marginBottom:16, background:"#0f172a", borderRadius:10, padding:14, borderLeft:`4px solid ${f.color}`}}>
                  <span style={{fontSize:28, minWidth:36}}>{f.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{color:f.color, fontWeight:700, fontSize:15, marginBottom:6}}>{f.name}</div>
                    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginBottom:8}}>
                      {Object.entries(f.startResources).filter(([,v])=>v>0).map(([r,v])=>(
                        <span key={r} style={{fontSize:12, color:"#94a3b8"}}>
                          {RESOURCES[r]?.icon} {RESOURCES[r]?.name} {v}개
                        </span>
                      ))}
                    </div>
                    <div style={{fontSize:12, color:"#60a5fa", marginBottom:4}}>🔹 패시브: {f.passive}</div>
                    <div style={{fontSize:12, color:"#a78bfa", marginBottom:8}}>⚡ 능력: {f.ability}</div>
                    <div style={{display:"flex", flexDirection:"column", gap:3}}>
                      <div style={{fontSize:11, color:"#4ade80"}}>🎯 주 목표: {f.goalMain.desc}</div>
                      <div style={{fontSize:11, color:"#fbbf24"}}>📊 부 목표: {f.goalSub.desc}</div>
                      <div style={{fontSize:11, color:"#f59e0b"}}>🏆 최종 목표: {f.goalFinal.desc}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

function GuideSection({ title, color, children }) {
  return (
    <div style={{marginBottom:20}}>
      <div style={{color, fontWeight:700, fontSize:15, marginBottom:10, paddingBottom:6, borderBottom:`1px solid ${color}33`}}>{title}</div>
      <div style={{color:"#cbd5e1", fontSize:13, lineHeight:1.8}}>{children}</div>
    </div>
  );
}

function StepRow({ n, title, color, children }) {
  return (
    <div style={{display:"flex", gap:12, marginBottom:12, alignItems:"flex-start"}}>
      <div style={{minWidth:24, height:24, borderRadius:"50%", background:color, color:"#0f172a", fontWeight:700, fontSize:12, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:2}}>{n}</div>
      <div>
        <div style={{color:"#e2e8f0", fontWeight:700, fontSize:13, marginBottom:2}}>{title}</div>
        <div style={{color:"#94a3b8", fontSize:12, lineHeight:1.7}}>{children}</div>
      </div>
    </div>
  );
}

function ActionRow({ icon, label, desc }) {
  return (
    <div style={{display:"flex", gap:10, marginBottom:10, alignItems:"flex-start"}}>
      <span style={{fontSize:20, minWidth:28}}>{icon}</span>
      <div>
        <b style={{color:"#e2e8f0", fontSize:13}}>{label}</b>
        <div style={{color:"#94a3b8", fontSize:12, marginTop:2}}>{desc}</div>
      </div>
    </div>
  );
}

function ResultScreen({ gameState, onRestart }) {
  const sorted = [...gameState.players].sort((a, b) => b.score - a.score);
  return (
    <div style={styles.lobbyRoot}>
      <div style={styles.resultPanel}>
        <div style={styles.resultTitle}>🏆 게임 종료!</div>
        <div style={styles.winnerAnnounce}>
          {FACTIONS[sorted[0].faction].icon} {sorted[0].name} 승리!
        </div>
        <div style={styles.rankList}>
          {sorted.map((p, i) => (
            <div key={p.id} style={{ ...styles.rankRow, borderColor: p.color }}>
              <span style={styles.rankNum}>{["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣"][i]}</span>
              <span style={{ color: p.color }}>{FACTIONS[p.faction].icon} {p.name}</span>
              <span style={styles.rankScore}>{p.score}점</span>
              <span style={{ color: "#64748b", fontSize: 11 }}>영토 {p.territories.length}칸 / 카드 {p.cards.length}장</span>
            </div>
          ))}
        </div>
        <button style={styles.lobbyBtn} onClick={onRestart}>처음으로</button>
      </div>
    </div>
  );
}
